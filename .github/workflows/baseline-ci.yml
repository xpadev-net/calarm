name: Baseline CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .fvmrc ]]; then
            version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
            if [[ -z "${version}" ]]; then
              echo "::error::.fvmrc exists but does not define a non-empty flutter version"
              exit 1
            fi
          else
            echo "::error::.fvmrc is required so CI and local validation use the same Flutter SDK"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Using Flutter ${version} from .fvmrc"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable

      - name: Resolve dependencies
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          flutter pub get 2>&1 | tee artifacts/logs/flutter-pub-get.log

      - name: Check formatting
        shell: bash
        run: |
          set -o pipefail
          dart format --set-exit-if-changed . 2>&1 | tee artifacts/logs/dart-format.log

      - name: Analyze
        shell: bash
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee artifacts/logs/flutter-analyze.log

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          flutter test 2>&1 | tee artifacts/logs/flutter-test.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-ci-logs
          path: artifacts/logs
          if-no-files-found: warn
