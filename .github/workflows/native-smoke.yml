name: Native Smoke CI

on:
  pull_request:
    paths:
      - '.github/workflows/native-smoke.yml'
      - '.github/workflows/**'
      - '.fvmrc'
      - 'android/**'
      - 'ios/**'
      - 'integration_test/**'
      - 'test_driver/**'
      - 'lib/core/platform/**'
      - 'docs/qa/ci-native-smoke.md'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:
    inputs:
      run_android:
        description: 'Run Android emulator smoke'
        required: true
        default: true
        type: boolean
      run_ios:
        description: 'Run iOS simulator smoke'
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SMOKE_ARTIFACT_ROOT: artifacts/native-smoke

jobs:
  android-emulator:
    name: Android emulator native smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_android }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
          if [[ -z "${version}" ]]; then
            echo "::error::.fvmrc must define a non-empty flutter version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Flutter
        shell: bash
        env:
          FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${FLUTTER_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::.fvmrc Flutter version must be an exact semver tag"
            exit 1
          fi
          flutter_root="${RUNNER_TOOL_CACHE}/flutter-${FLUTTER_VERSION}"
          if [[ ! -x "${flutter_root}/bin/flutter" ]]; then
            rm -rf "${flutter_root}"
            git clone --depth 1 --branch "${FLUTTER_VERSION}" \
              https://github.com/flutter/flutter.git "${flutter_root}"
          fi
          echo "${flutter_root}/bin" >> "${GITHUB_PATH}"
          "${flutter_root}/bin/flutter" --version

      - name: Resolve dependencies
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "${SMOKE_ARTIFACT_ROOT}/logs"
          flutter pub get 2>&1 | tee "${SMOKE_ARTIFACT_ROOT}/logs/android-flutter-pub-get.log"

      - name: Build Android debug APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${SMOKE_ARTIFACT_ROOT}/summary"

          run_with_timeout() {
            local seconds="$1"
            shift
            perl -MPOSIX=setsid -e 'setsid() or die "setsid: $!"; exec @ARGV or die "exec: $!"' "$@" &
            local command_pid="$!"
            local elapsed=0
            while kill -0 "${command_pid}" >/dev/null 2>&1; do
              if [[ "${elapsed}" -ge "${seconds}" ]]; then
                kill -TERM "-${command_pid}" >/dev/null 2>&1 || kill "${command_pid}" >/dev/null 2>&1 || true
                sleep 5
                kill -KILL "-${command_pid}" >/dev/null 2>&1 || kill -9 "${command_pid}" >/dev/null 2>&1 || true
                wait "${command_pid}" >/dev/null 2>&1 || true
                return 124
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            wait "${command_pid}"
          }

          set +e
          run_with_timeout 900 bash -o pipefail -c \
            'flutter build apk --debug 2>&1 | tee "$1"' \
            bash "${SMOKE_ARTIFACT_ROOT}/logs/android-build-apk-debug.log"
          build_status="$?"
          set -e
          if [[ "${build_status}" -ne 0 ]]; then
            if [[ "${build_status}" -eq 124 ]]; then
              echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-build-apk-debug.log"
              timeout_reason="Android debug APK build timed out on the hosted runner."
            else
              timeout_reason="Android debug APK build failed on the hosted runner."
            fi
            {
              echo "# Android native smoke"
              echo
              echo "- status: BLOCKED"
              echo "- reason: ${timeout_reason}"
              echo "- evidence: artifacts/native-smoke/logs/android-build-apk-debug.log"
              echo "- runtime approval: not approved; real-device Android API 36 wake, lock/terminated, full-screen UI, Silent/Focus-equivalent, and reboot restore gates remain BLOCKED"
            } > "${SMOKE_ARTIFACT_ROOT}/summary/android-summary.md"
            exit 1
          fi

      - name: Run Android emulator smoke
        id: android-smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${SMOKE_ARTIFACT_ROOT}/logs" "${SMOKE_ARTIFACT_ROOT}/summary"

          write_android_blocked_summary() {
            local reason="$1"
            local evidence="$2"
            {
              echo "# Android native smoke"
              echo
              echo "- status: BLOCKED"
              echo "- preferred target: Android API 36 emulator"
              echo "- reason: ${reason}"
              echo "- evidence: ${evidence}"
              echo "- runtime approval: not approved; real-device Android API 36 wake, lock/terminated, full-screen UI, Silent/Focus-equivalent, and reboot restore gates remain BLOCKED"
            } > "${SMOKE_ARTIFACT_ROOT}/summary/android-summary.md"
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            perl -MPOSIX=setsid -e 'setsid() or die "setsid: $!"; exec @ARGV or die "exec: $!"' "$@" &
            local command_pid="$!"
            local elapsed=0
            while kill -0 "${command_pid}" >/dev/null 2>&1; do
              if [[ "${elapsed}" -ge "${seconds}" ]]; then
                kill -TERM "-${command_pid}" >/dev/null 2>&1 || kill "${command_pid}" >/dev/null 2>&1 || true
                sleep 5
                kill -KILL "-${command_pid}" >/dev/null 2>&1 || kill -9 "${command_pid}" >/dev/null 2>&1 || true
                wait "${command_pid}" >/dev/null 2>&1 || true
                return 124
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            wait "${command_pid}"
          }

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${sdk_root}" || ! -x "${sdk_root}/cmdline-tools/latest/bin/sdkmanager" ]]; then
            write_android_blocked_summary \
              "Android SDK command-line tools were unavailable on the hosted runner." \
              "hosted runner environment"
            exit 0
          fi

          sdkmanager="${sdk_root}/cmdline-tools/latest/bin/sdkmanager"
          avdmanager="${sdk_root}/cmdline-tools/latest/bin/avdmanager"
          emulator="${sdk_root}/emulator/emulator"
          for tool_path in "${avdmanager}" "${emulator}"; do
            if [[ ! -x "${tool_path}" ]]; then
              write_android_blocked_summary \
                "Required Android emulator tool was unavailable: ${tool_path}" \
                "hosted runner environment"
              exit 0
            fi
          done

          set +e
          run_with_timeout 180 bash -c '"$1" --list > "$2" 2>&1' \
            bash "${sdkmanager}" "${SMOKE_ARTIFACT_ROOT}/logs/android-sdkmanager-list.log"
          sdk_list_status="$?"
          set -e
          if [[ "${sdk_list_status}" -ne 0 ]]; then
            if [[ "${sdk_list_status}" -eq 124 ]]; then
              echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-sdkmanager-list.log"
              write_android_blocked_summary \
                "sdkmanager timed out while listing hosted Android packages." \
                "artifacts/native-smoke/logs/android-sdkmanager-list.log"
              exit 1
            fi
            write_android_blocked_summary \
              "sdkmanager could not list hosted Android packages." \
              "artifacts/native-smoke/logs/android-sdkmanager-list.log"
            exit 0
          fi
          image=""
          api=""
          for candidate in \
            "36;google_apis;x86_64" \
            "36;google_apis_playstore;x86_64" \
            "35;google_apis;x86_64" \
            "35;google_apis_playstore;x86_64"; do
            package="system-images;android-${candidate}"
            if grep -Fq "${package}" "${SMOKE_ARTIFACT_ROOT}/logs/android-sdkmanager-list.log"; then
              image="${package}"
              api="${candidate%%;*}"
              break
            fi
          done

          if [[ -z "${image}" ]]; then
            write_android_blocked_summary \
              "No API 36 or API 35 google_apis x86_64 hosted emulator image was listed by sdkmanager." \
              "artifacts/native-smoke/logs/android-sdkmanager-list.log"
            exit 0
          fi

          set +e
          run_with_timeout 180 bash -o pipefail -c \
            'yes | "$1" --licenses > "$2"' \
            bash "${sdkmanager}" "${SMOKE_ARTIFACT_ROOT}/logs/android-sdk-licenses.log"
          license_status="$?"
          set -e
          if [[ "${license_status}" -eq 124 ]]; then
            echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-sdk-licenses.log"
            write_android_blocked_summary \
              "sdkmanager license acceptance timed out on the hosted runner." \
              "artifacts/native-smoke/logs/android-sdk-licenses.log"
            exit 1
          fi
          set +e
          run_with_timeout 600 bash -o pipefail -c \
            '"$1" "$2" "$3" "platform-tools" "emulator" 2>&1 | tee "$4"' \
            bash "${sdkmanager}" "${image}" "platforms;android-${api}" "${SMOKE_ARTIFACT_ROOT}/logs/android-sdk-install.log"
          sdk_install_status="$?"
          set -e
          if [[ "${sdk_install_status}" -ne 0 ]]; then
            if [[ "${sdk_install_status}" -eq 124 ]]; then
              echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-sdk-install.log"
              write_android_blocked_summary \
                "Timed out installing the selected hosted Android emulator image or platform tools." \
                "artifacts/native-smoke/logs/android-sdk-install.log"
              exit 1
            fi
            write_android_blocked_summary \
              "Failed to install the selected hosted Android emulator image or platform tools." \
              "artifacts/native-smoke/logs/android-sdk-install.log"
            exit 0
          fi
          set +e
          run_with_timeout 180 bash -o pipefail -c \
            'echo "no" | "$1" create avd --force --name "$2" --package "$3" --device "pixel_7" 2>&1 | tee "$4"' \
            bash "${avdmanager}" "calarm-api-${api}" "${image}" "${SMOKE_ARTIFACT_ROOT}/logs/android-avd-create.log"
          avd_create_status="$?"
          set -e
          if [[ "${avd_create_status}" -ne 0 ]]; then
            if [[ "${avd_create_status}" -eq 124 ]]; then
              echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-avd-create.log"
              write_android_blocked_summary \
                "Timed out creating an Android virtual device for ${image}." \
                "artifacts/native-smoke/logs/android-avd-create.log"
              exit 1
            fi
            write_android_blocked_summary \
              "Failed to create an Android virtual device for ${image}." \
              "artifacts/native-smoke/logs/android-avd-create.log"
            exit 0
          fi

          "${emulator}" -avd "calarm-api-${api}" \
            -no-window \
            -no-audio \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -no-boot-anim \
            > "${SMOKE_ARTIFACT_ROOT}/logs/android-emulator.log" 2>&1 &
          emulator_pid="$!"
          trap 'adb emu kill >/dev/null 2>&1 || true; kill "${emulator_pid}" >/dev/null 2>&1 || true' EXIT
          sleep 5
          if ! kill -0 "${emulator_pid}" >/dev/null 2>&1; then
            write_android_blocked_summary \
              "Android emulator process exited before boot completed." \
              "artifacts/native-smoke/logs/android-emulator.log"
            exit 0
          fi

          if ! timeout 180 adb wait-for-device; then
            echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-emulator.log"
            write_android_blocked_summary \
              "adb did not observe a booting emulator within 180 seconds." \
              "artifacts/native-smoke/logs/android-emulator.log"
            exit 1
          fi
          boot_completed=""
          for _ in {1..90}; do
            boot_completed="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)"
            if [[ "${boot_completed}" == "1" ]]; then
              break
            fi
            sleep 2
          done
          if [[ "${boot_completed}" != "1" ]]; then
            echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-emulator.log"
            write_android_blocked_summary \
              "Emulator did not finish booting on the hosted runner. Selected image: ${image}." \
              "artifacts/native-smoke/logs/android-emulator.log"
            exit 1
          fi

          adb shell input keyevent 82 || true
          flutter devices 2>&1 | tee "${SMOKE_ARTIFACT_ROOT}/logs/android-flutter-devices.log"
          if [[ "${api}" == "36" ]]; then
            evidence_label="NEAR_DEVICE"
            runtime_reason="Android API 36 hosted emulator image was available."
          else
            evidence_label="BLOCKED"
            runtime_reason="Android API 36 hosted emulator image was unavailable; closest smoke used API ${api}."
          fi
          set +e
          run_with_timeout 600 bash -o pipefail -c \
            'flutter test integration_test/native_alarm_smoke_test.dart -d emulator-5554 --dart-define=CALARM_NATIVE_SMOKE_PLATFORM=android --dart-define=CALARM_NATIVE_SMOKE_EVIDENCE_LABEL="$1" --timeout 5m 2>&1 | tee "$2"' \
            bash "${evidence_label}" "${SMOKE_ARTIFACT_ROOT}/logs/android-native-smoke-test.log"
          smoke_status="$?"
          set -e

          adb logcat -d > "${SMOKE_ARTIFACT_ROOT}/logs/android-adb-logcat.log" || true
          adb shell dumpsys alarm > "${SMOKE_ARTIFACT_ROOT}/logs/android-dumpsys-alarm.log" 2>&1 || true
          smoke_outcome="$(grep -E 'CALARM_NATIVE_SMOKE_OUTCOME=' "${SMOKE_ARTIFACT_ROOT}/logs/android-native-smoke-test.log" | tail -n 1 | cut -d= -f2 || true)"
          if [[ "${smoke_status}" -ne 0 ]]; then
            if [[ "${smoke_status}" -eq 124 ]]; then
              echo "CALARM_NATIVE_SMOKE_OUTCOME=BLOCKED" >> "${SMOKE_ARTIFACT_ROOT}/logs/android-native-smoke-test.log"
              smoke_reason="MethodChannel smoke test timed out; see artifacts/native-smoke/logs/android-native-smoke-test.log"
            else
              smoke_reason="MethodChannel smoke test failed; see artifacts/native-smoke/logs/android-native-smoke-test.log"
            fi
            {
              echo "# Android native smoke"
              echo
              echo "- status: BLOCKED"
              echo "- selected emulator image: ${image}"
              echo "- target preference: API 36, with API 35 fallback"
              echo "- reason: ${smoke_reason}"
              echo "- runtime approval: not approved; real-device Android API 36 wake, lock/terminated, full-screen UI, Silent/Focus-equivalent, and reboot restore gates remain BLOCKED"
            } > "${SMOKE_ARTIFACT_ROOT}/summary/android-summary.md"
            exit "${smoke_status}"
          fi
          if [[ "${smoke_outcome}" != "NEAR_DEVICE" ]]; then
            evidence_label="BLOCKED"
            runtime_reason="${runtime_reason} Critical native alarm schedule/cancel/test-alarm operations did not all succeed; see artifacts/native-smoke/logs/android-native-smoke-test.log."
          fi
          {
            echo "# Android native smoke"
            echo
            echo "- status: ${evidence_label}"
            echo "- selected emulator image: ${image}"
            echo "- target preference: API 36, with API 35 fallback"
            echo "- reason: ${runtime_reason}"
            echo "- runtime approval: not approved; real-device Android API 36 wake, lock/terminated, full-screen UI, Silent/Focus-equivalent, and reboot restore gates remain BLOCKED"
            echo "- evidence: artifacts/native-smoke/logs/android-native-smoke-test.log"
          } > "${SMOKE_ARTIFACT_ROOT}/summary/android-summary.md"

      - name: Upload Android native smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-native-smoke
          path: artifacts/native-smoke
          if-no-files-found: warn

  ios-simulator:
    name: iOS simulator native smoke
    runs-on: macos-latest
    timeout-minutes: 60
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_ios }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
          if [[ -z "${version}" ]]; then
            echo "::error::.fvmrc must define a non-empty flutter version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Flutter
        shell: bash
        env:
          FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${FLUTTER_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::.fvmrc Flutter version must be an exact semver tag"
            exit 1
          fi
          flutter_root="${RUNNER_TOOL_CACHE}/flutter-${FLUTTER_VERSION}"
          if [[ ! -x "${flutter_root}/bin/flutter" ]]; then
            rm -rf "${flutter_root}"
            git clone --depth 1 --branch "${FLUTTER_VERSION}" \
              https://github.com/flutter/flutter.git "${flutter_root}"
          fi
          echo "${flutter_root}/bin" >> "${GITHUB_PATH}"
          "${flutter_root}/bin/flutter" --version

      - name: Resolve dependencies
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "${SMOKE_ARTIFACT_ROOT}/logs"
          flutter pub get 2>&1 | tee "${SMOKE_ARTIFACT_ROOT}/logs/ios-flutter-pub-get.log"

      - name: Run iOS simulator smoke
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${SMOKE_ARTIFACT_ROOT}/logs" "${SMOKE_ARTIFACT_ROOT}/summary"

          write_ios_blocked_summary() {
            local reason="$1"
            local evidence="$2"
            local preferred_target="${3:-iOS 26+ simulator runtime}"
            {
              echo "# iOS native smoke"
              echo
              echo "- status: BLOCKED"
              echo "- preferred target: ${preferred_target}"
              if [[ -n "${runtime_version:-}" && -n "${runtime_id:-}" ]]; then
                echo "- selected runtime: ${runtime_version} (${runtime_id})"
              fi
              echo "- detected iphonesimulator SDK: ${simulator_sdk:-unavailable}"
              echo "- reason: ${reason}"
              echo "- evidence: ${evidence}"
              echo "- runtime approval: not approved; real-device iOS 26+ wake, lock/terminated, Silent/Focus, and full-screen stop UI gates remain BLOCKED"
            } > "${SMOKE_ARTIFACT_ROOT}/summary/ios-summary.md"
          }

          run_with_timeout() {
            local seconds="$1"
            shift
            perl -MPOSIX=setsid -e 'setsid() or die "setsid: $!"; exec @ARGV or die "exec: $!"' "$@" &
            local command_pid="$!"
            local elapsed=0
            while kill -0 "${command_pid}" >/dev/null 2>&1; do
              if [[ "${elapsed}" -ge "${seconds}" ]]; then
                kill -TERM "-${command_pid}" >/dev/null 2>&1 || kill "${command_pid}" >/dev/null 2>&1 || true
                sleep 5
                kill -KILL "-${command_pid}" >/dev/null 2>&1 || kill -9 "${command_pid}" >/dev/null 2>&1 || true
                wait "${command_pid}" >/dev/null 2>&1 || true
                return 124
              fi
              sleep 5
              elapsed=$((elapsed + 5))
            done
            wait "${command_pid}"
          }

          xcodebuild -version > "${SMOKE_ARTIFACT_ROOT}/logs/ios-xcodebuild-version.log" 2>&1 || true
          xcrun simctl list runtimes > "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-runtimes.txt" 2>&1 || true
          if ! xcrun simctl list runtimes -j > "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-runtimes.json" 2>&1; then
            write_ios_blocked_summary \
              "simctl could not list hosted iOS runtimes as JSON." \
              "artifacts/native-smoke/logs/ios-simctl-runtimes.json"
            exit 0
          fi
          simulator_sdk="$(xcrun --sdk iphonesimulator --show-sdk-version 2>/dev/null || true)"
          simulator_sdk_major="${simulator_sdk%%.*}"

          if [[ -z "${simulator_sdk}" || "${simulator_sdk_major}" -lt 26 ]]; then
            write_ios_blocked_summary \
              "Hosted runner does not expose an iOS 26+ simulator SDK required by the AlarmKit bridge." \
              "artifacts/native-smoke/logs/ios-xcodebuild-version.log and ios-simctl-runtimes.txt" \
              "iOS 26+ simulator runtime and SDK"
            exit 0
          fi

          if ! jq empty "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-runtimes.json"; then
            write_ios_blocked_summary \
              "simctl runtime JSON was invalid on the hosted runner." \
              "artifacts/native-smoke/logs/ios-simctl-runtimes.json"
            exit 0
          fi

          if ! runtime_id="$(jq -r '
            .runtimes
            | map(select(.platform == "iOS" and .isAvailable == true))
            | sort_by(.version | split(".") | map(tonumber))
            | reverse
            | .[0].identifier // empty
          ' "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-runtimes.json")"; then
            write_ios_blocked_summary \
              "Could not parse available iOS simulator runtimes." \
              "artifacts/native-smoke/logs/ios-simctl-runtimes.json"
            exit 0
          fi
          runtime_version="$(jq -r --arg id "${runtime_id}" '.runtimes[] | select(.identifier == $id) | .version' "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-runtimes.json")"

          if [[ -z "${runtime_id}" ]]; then
            write_ios_blocked_summary \
              "Hosted runner exposes no available iOS simulator runtime." \
              "artifacts/native-smoke/logs/ios-simctl-runtimes.txt"
            exit 0
          fi

          set +e
          run_with_timeout 900 bash -o pipefail -c \
            'flutter build ios --simulator --debug 2>&1 | tee "$1"' \
            bash "${SMOKE_ARTIFACT_ROOT}/logs/ios-build-simulator-debug.log"
          build_status="$?"
          set -e
          if [[ "${build_status}" -ne 0 ]]; then
            write_ios_blocked_summary \
              "iOS simulator build failed or timed out on the hosted runner." \
              "artifacts/native-smoke/logs/ios-build-simulator-debug.log"
            exit 1
          fi
          if ! device_id="$(xcrun simctl create "Calarm Native Smoke" "iPhone 16" "${runtime_id}" 2>> "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-create.log")"; then
            write_ios_blocked_summary \
              "Failed to create a hosted iOS simulator." \
              "artifacts/native-smoke/logs/ios-simctl-create.log"
            exit 0
          fi
          echo "${device_id}" > "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-create-udid.log"
          trap 'xcrun simctl shutdown "${device_id}" >/dev/null 2>&1 || true; xcrun simctl delete "${device_id}" >/dev/null 2>&1 || true' EXIT

          if ! xcrun simctl boot "${device_id}" 2>&1 | tee "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-boot.log"; then
            write_ios_blocked_summary \
              "Failed to boot the hosted iOS simulator." \
              "artifacts/native-smoke/logs/ios-simctl-boot.log"
            exit 0
          fi
          if ! run_with_timeout 300 bash -o pipefail -c \
            'xcrun simctl bootstatus "$1" -b 2>&1 | tee "$2"' \
            bash "${device_id}" "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-bootstatus.log"; then
            write_ios_blocked_summary \
              "Hosted iOS simulator did not reach booted status within 300 seconds." \
              "artifacts/native-smoke/logs/ios-simctl-bootstatus.log"
            exit 0
          fi
          flutter devices 2>&1 | tee "${SMOKE_ARTIFACT_ROOT}/logs/ios-flutter-devices.log"
          if [[ "${runtime_version%%.*}" -ge 26 ]]; then
            status="NEAR_DEVICE"
            reason="iOS 26+ simulator runtime was available."
          else
            status="BLOCKED"
            reason="Closest hosted iOS simulator runtime was ${runtime_version}, below iOS 26; platform-channel unavailable paths were smoke-tested only."
          fi
          set +e
          run_with_timeout 600 bash -o pipefail -c \
            'flutter test integration_test/native_alarm_smoke_test.dart -d "$1" --dart-define=CALARM_NATIVE_SMOKE_PLATFORM=ios --dart-define=CALARM_NATIVE_SMOKE_EVIDENCE_LABEL="$2" --timeout 5m 2>&1 | tee "$3"' \
            bash "${device_id}" "${status}" "${SMOKE_ARTIFACT_ROOT}/logs/ios-native-smoke-test.log"
          smoke_status="$?"
          set -e
          xcrun simctl spawn "${device_id}" log show --style compact --last 10m \
            > "${SMOKE_ARTIFACT_ROOT}/logs/ios-simctl-log-show.log" 2>&1 || true
          xcrun simctl io "${device_id}" screenshot "${SMOKE_ARTIFACT_ROOT}/logs/ios-screenshot.png" \
            > "${SMOKE_ARTIFACT_ROOT}/logs/ios-screenshot.log" 2>&1 || true
          smoke_outcome="$(grep -E 'CALARM_NATIVE_SMOKE_OUTCOME=' "${SMOKE_ARTIFACT_ROOT}/logs/ios-native-smoke-test.log" | tail -n 1 | cut -d= -f2 || true)"

          if [[ "${smoke_status}" -ne 0 ]]; then
            write_ios_blocked_summary \
              "MethodChannel smoke test failed or timed out; see artifacts/native-smoke/logs/ios-native-smoke-test.log" \
              "artifacts/native-smoke/logs/ios-native-smoke-test.log"
            exit "${smoke_status}"
          fi
          if [[ "${smoke_outcome}" != "NEAR_DEVICE" ]]; then
            status="BLOCKED"
            reason="${reason} Critical native alarm schedule/cancel/test-alarm operations did not all succeed; see artifacts/native-smoke/logs/ios-native-smoke-test.log."
          fi

          {
            echo "# iOS native smoke"
            echo
            echo "- status: ${status}"
            echo "- selected runtime: ${runtime_version} (${runtime_id})"
            echo "- detected iphonesimulator SDK: ${simulator_sdk}"
            echo "- reason: ${reason}"
            echo "- runtime approval: not approved; real-device iOS 26+ wake, lock/terminated, Silent/Focus, and full-screen stop UI gates remain BLOCKED"
            echo "- evidence: artifacts/native-smoke/logs/ios-native-smoke-test.log"
          } > "${SMOKE_ARTIFACT_ROOT}/summary/ios-summary.md"

      - name: Upload iOS native smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-native-smoke
          path: artifacts/native-smoke
          if-no-files-found: warn
