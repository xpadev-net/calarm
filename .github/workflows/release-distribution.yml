name: Release Distribution Artifacts

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing GitHub Release tag to attach artifacts to'
        required: true
        type: string
      upload_ios_testflight:
        description: 'Build and upload an iOS IPA to App Store Connect for TestFlight internal testing'
        required: true
        default: false
        type: boolean
      upload_android_play_internal:
        description: 'Build and upload a signed Android App Bundle to Google Play closed testing'
        required: true
        default: false
        type: boolean
      android_build_number:
        description: 'Optional Android version code; defaults to the GitHub run number'
        required: false
        type: string
      ios_build_name:
        description: 'iOS marketing version passed to Flutter when uploading to TestFlight'
        required: false
        default: '1.0.0'
        type: string
      ios_build_number:
        description: 'iOS build number passed to Flutter; defaults to the GitHub run number when empty'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

env:
  RELEASE_ARTIFACT_ROOT: artifacts/release-distribution
  ANDROID_APK_SOURCE: build/app/outputs/flutter-apk/app-debug.apk
  ANDROID_APK_NAME: calarm-android-validation-debug.apk
  IOS_IPA_GLOB: build/ios/ipa/*.ipa

jobs:
  android-validation-apk:
    name: Android validation APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      # Needed to attach validation APK assets to GitHub Releases.
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "release" ]]; then
            tag="${RELEASE_EVENT_TAG}"
          else
            tag="${DISPATCH_RELEASE_TAG}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "::error::release_tag is required for manual runs"
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release tag: ${tag}"

      - name: Verify GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null

      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Verify checkout provenance
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          if [[ "${head_sha}" != "${tag_sha}" ]]; then
            echo "::error::Checked out ${head_sha}, but release tag ${RELEASE_TAG} points to ${tag_sha}"
            exit 1
          fi
          echo "CALARM_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "CALARM_RELEASE_COMMIT=${head_sha}" >> "${GITHUB_ENV}"

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
          if [[ -z "${version}" ]]; then
            echo "::error::.fvmrc must define a non-empty flutter version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Flutter, pub, and Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ runner.tool_cache }}/flutter-${{ steps.flutter-version.outputs.version }}
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-${{ steps.flutter-version.outputs.version }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-${{ steps.flutter-version.outputs.version }}-

      - name: Set up Flutter
        shell: bash
        env:
          FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${FLUTTER_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::.fvmrc Flutter version must be an exact semver tag"
            exit 1
          fi
          flutter_root="${RUNNER_TOOL_CACHE}/flutter-${FLUTTER_VERSION}"
          if [[ ! -x "${flutter_root}/bin/flutter" ]]; then
            rm -rf "${flutter_root}"
            git clone --depth 1 --branch "${FLUTTER_VERSION}" \
              https://github.com/flutter/flutter.git "${flutter_root}"
          fi
          echo "${flutter_root}/bin" >> "${GITHUB_PATH}"
          "${flutter_root}/bin/flutter" --version

      - name: Resolve dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RELEASE_ARTIFACT_ROOT}/logs"
          flutter pub get 2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/flutter-pub-get.log"

      - name: Build Android debug validation APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RELEASE_ARTIFACT_ROOT}/logs" "${RELEASE_ARTIFACT_ROOT}/android"
          flutter build apk --debug 2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/android-build-apk-debug.log"
          cp "${ANDROID_APK_SOURCE}" "${RELEASE_ARTIFACT_ROOT}/android/${ANDROID_APK_NAME}"
          sha256sum "${RELEASE_ARTIFACT_ROOT}/android/${ANDROID_APK_NAME}" \
            > "${RELEASE_ARTIFACT_ROOT}/android/${ANDROID_APK_NAME}.sha256"

      - name: Write artifact warning
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          cat > "${RELEASE_ARTIFACT_ROOT}/android/README.md" <<EOF
          # Calarm Android validation APK

          - Release tag: ${RELEASE_TAG}
          - Artifact: ${ANDROID_APK_NAME}
          - Source commit: ${CALARM_RELEASE_COMMIT}
          - Build mode: Flutter debug APK
          - Signing: Android debug signing key
          - Intended use: installable real-device validation for the deferred Android API 36 runtime checklist
          - Release approval: not approved by this artifact; Android API 36 real-device wake delivery, lock/terminated behavior, permission policy behavior, full-screen stop UI, cancel semantics, 13-equivalent reservations, reboot/package-replace restore, and cleanup gates remain BLOCKED until QA evidence is collected

          This APK is not a Play Store, production, or release-approval artifact. The guarded Google Play internal-testing workflow is separate and requires environment-scoped release-signing and Play credentials.
          EOF

      - name: Upload workflow artifact copy
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-validation-apk
          path: artifacts/release-distribution
          if-no-files-found: warn

      - name: Attach APK to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" \
            "${RELEASE_ARTIFACT_ROOT}/android/${ANDROID_APK_NAME}" \
            "${RELEASE_ARTIFACT_ROOT}/android/${ANDROID_APK_NAME}.sha256" \
            "${RELEASE_ARTIFACT_ROOT}/android/README.md#calarm-android-validation-apk-readme.md" \
            --clobber

  android-play-internal:
    name: Android Google Play closed testing upload
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_android_play_internal }}
    environment: google-play-internal
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${DISPATCH_RELEASE_TAG}" ]]; then
            echo "::error::release_tag is required for Google Play upload runs"
            exit 1
          fi
          echo "tag=${DISPATCH_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release tag: ${DISPATCH_RELEASE_TAG}"

      - name: Verify GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null

      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Verify checkout provenance
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          if [[ "${head_sha}" != "${tag_sha}" ]]; then
            echo "::error::Checked out ${head_sha}, but release tag ${RELEASE_TAG} points to ${tag_sha}"
            exit 1
          fi
          echo "CALARM_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "CALARM_RELEASE_COMMIT=${head_sha}" >> "${GITHUB_ENV}"

      - name: Validate Google Play WIF and Android signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT_EMAIL; do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf '::error::Missing required Google Play/WIF secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity Federation
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
          if [[ -z "${version}" ]]; then
            echo "::error::.fvmrc must define a non-empty flutter version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Flutter, pub, and Gradle dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ${{ runner.tool_cache }}/flutter-${{ steps.flutter-version.outputs.version }}
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-android-${{ steps.flutter-version.outputs.version }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-android-${{ steps.flutter-version.outputs.version }}-

      - name: Set up Flutter
        shell: bash
        env:
          FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${FLUTTER_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::.fvmrc Flutter version must be an exact semver tag"
            exit 1
          fi
          flutter_root="${RUNNER_TOOL_CACHE}/flutter-${FLUTTER_VERSION}"
          if [[ ! -x "${flutter_root}/bin/flutter" ]]; then
            rm -rf "${flutter_root}"
            git clone --depth 1 --branch "${FLUTTER_VERSION}" \
              https://github.com/flutter/flutter.git "${flutter_root}"
          fi
          echo "${flutter_root}/bin" >> "${GITHUB_PATH}"
          "${flutter_root}/bin/flutter" --version

      - name: Install Android signing material
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_path="${RUNNER_TEMP}/calarm-upload-keystore.jks"
          properties_path="${RUNNER_TEMP}/calarm-android-signing.properties"
          cleanup() {
            rm -f "${keystore_path}" "${properties_path}"
          }
          trap cleanup EXIT
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          {
            printf 'storeFile=%s\n' "${keystore_path}"
            printf 'storePassword=%s\n' "${ANDROID_KEYSTORE_PASSWORD}"
            printf 'keyAlias=%s\n' "${ANDROID_KEY_ALIAS}"
            printf 'keyPassword=%s\n' "${ANDROID_KEY_PASSWORD}"
          } > "${properties_path}"
          echo "CALARM_ANDROID_SIGNING_PROPERTIES=${properties_path}" >> "${GITHUB_ENV}"
          echo "CALARM_ANDROID_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"
          trap - EXIT

      - name: Build signed Android App Bundle
        shell: bash
        env:
          ANDROID_BUILD_NUMBER_INPUT: ${{ inputs.android_build_number }}
        run: |
          set -euo pipefail
          build_number="${ANDROID_BUILD_NUMBER_INPUT:-${GITHUB_RUN_NUMBER}}"
          mkdir -p "${RELEASE_ARTIFACT_ROOT}/logs" "${RELEASE_ARTIFACT_ROOT}/android"
          flutter pub get 2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/android-play-flutter-pub-get.log"
          flutter build appbundle \
            --release \
            --build-number "${build_number}" \
            2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/android-play-build-aab.log"
          aab_path="build/app/outputs/bundle/release/app-release.aab"
          if [[ ! -f "${aab_path}" ]]; then
            echo "::error::Expected Android App Bundle was not produced at ${aab_path}"
            exit 1
          fi
          cp "${aab_path}" "${RELEASE_ARTIFACT_ROOT}/android/calarm-google-play-internal.aab"

      - name: Upload Android App Bundle to Google Play closed testing
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJson: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          packageName: dev.xpa.calarm
          releaseFiles: artifacts/release-distribution/android/calarm-google-play-internal.aab
          tracks: alpha
          status: draft

      - name: Delete temporary Android signing material
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${CALARM_ANDROID_KEYSTORE_PATH:-}" ]]; then
            rm -f "${CALARM_ANDROID_KEYSTORE_PATH}"
          fi
          if [[ -n "${CALARM_ANDROID_SIGNING_PROPERTIES:-}" ]]; then
            rm -f "${CALARM_ANDROID_SIGNING_PROPERTIES}"
          fi
          if [[ -n "${GOOGLE_GHA_CREDS_PATH:-}" ]]; then
            rm -f "${GOOGLE_GHA_CREDS_PATH}"
          fi

      - name: Upload Android Play logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-play-internal-logs
          path: artifacts/release-distribution/logs
          if-no-files-found: warn

  ios-testflight-internal:
    name: iOS TestFlight internal upload
    runs-on: macos-latest
    timeout-minutes: 60
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_ios_testflight }}
    permissions:
      contents: read

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${DISPATCH_RELEASE_TAG}" ]]; then
            echo "::error::release_tag is required for TestFlight upload runs"
            exit 1
          fi
          echo "tag=${DISPATCH_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Resolved release tag: ${DISPATCH_RELEASE_TAG}"

      - name: Verify GitHub Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" >/dev/null

      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Verify checkout provenance
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          if [[ "${head_sha}" != "${tag_sha}" ]]; then
            echo "::error::Checked out ${head_sha}, but release tag ${RELEASE_TAG} points to ${tag_sha}"
            exit 1
          fi
          echo "CALARM_RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "CALARM_RELEASE_COMMIT=${head_sha}" >> "${GITHUB_ENV}"

      - name: Validate TestFlight secrets
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 \
            IOS_EXPORT_OPTIONS_PLIST_BASE64 \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_PRIVATE_KEY; do
            if [[ -z "${!name}" ]]; then
              missing+=("${name}")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf '::error::Missing required TestFlight secret(s): %s\n' "${missing[*]}"
            echo "This guarded job did not build or upload an IPA."
            exit 1
          fi

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.flutter // .flutterSdkVersion // empty' .fvmrc)"
          if [[ -z "${version}" ]]; then
            echo "::error::.fvmrc must define a non-empty flutter version"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Flutter
        shell: bash
        env:
          FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${FLUTTER_VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::.fvmrc Flutter version must be an exact semver tag"
            exit 1
          fi
          flutter_root="${RUNNER_TOOL_CACHE}/flutter-${FLUTTER_VERSION}"
          if [[ ! -x "${flutter_root}/bin/flutter" ]]; then
            rm -rf "${flutter_root}"
            git clone --depth 1 --branch "${FLUTTER_VERSION}" \
              https://github.com/flutter/flutter.git "${flutter_root}"
          fi
          echo "${flutter_root}/bin" >> "${GITHUB_PATH}"
          "${flutter_root}/bin/flutter" --version

      - name: Install signing material
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          keychain_path="${RUNNER_TEMP}/calarm-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="${RUNNER_TEMP}/ios-distribution.p12"
          profile_path="${RUNNER_TEMP}/Calarm_App_Store.mobileprovision"
          export_options_path="${RUNNER_TEMP}/ExportOptions.plist"
          private_keys_dir="${RUNNER_TEMP}/private_keys"

          echo "${IOS_DISTRIBUTION_CERTIFICATE_BASE64}" | base64 --decode > "${certificate_path}"
          echo "${IOS_APP_STORE_PROVISIONING_PROFILE_BASE64}" | base64 --decode > "${profile_path}"
          echo "${IOS_EXPORT_OPTIONS_PLIST_BASE64}" | base64 --decode > "${export_options_path}"
          mkdir -p "${private_keys_dir}" "${HOME}/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "${APP_STORE_CONNECT_API_PRIVATE_KEY}" > "${private_keys_dir}/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          cp "${profile_path}" "${HOME}/Library/MobileDevice/Provisioning Profiles/Calarm_App_Store.mobileprovision"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" \
            -P "${IOS_DISTRIBUTION_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"

          {
            echo "IOS_EXPORT_OPTIONS_PLIST=${export_options_path}"
            echo "API_PRIVATE_KEYS_DIR=${private_keys_dir}"
            echo "IOS_SIGNING_KEYCHAIN_PATH=${keychain_path}"
          } >> "${GITHUB_ENV}"

      - name: Build signed iOS IPA
        shell: bash
        env:
          IOS_BUILD_NAME: ${{ inputs.ios_build_name }}
          IOS_BUILD_NUMBER_INPUT: ${{ inputs.ios_build_number }}
        run: |
          set -euo pipefail
          build_number="${IOS_BUILD_NUMBER_INPUT:-${GITHUB_RUN_NUMBER}}"
          mkdir -p "${RELEASE_ARTIFACT_ROOT}/logs" "${RELEASE_ARTIFACT_ROOT}/ios"
          flutter pub get 2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/ios-flutter-pub-get.log"
          flutter build ipa \
            --release \
            --build-name "${IOS_BUILD_NAME}" \
            --build-number "${build_number}" \
            --export-options-plist "${IOS_EXPORT_OPTIONS_PLIST}" \
            2>&1 | tee "${RELEASE_ARTIFACT_ROOT}/logs/ios-build-ipa.log"
          ipa_path="$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -print -quit)"
          if [[ -z "${ipa_path}" ]]; then
            echo "::error::flutter build ipa completed but no IPA was found at ${IOS_IPA_GLOB}"
            exit 1
          fi
          cp "${ipa_path}" "${RELEASE_ARTIFACT_ROOT}/ios/calarm-ios-testflight-internal.ipa"

      - name: Upload IPA to App Store Connect
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            -f "${RELEASE_ARTIFACT_ROOT}/ios/calarm-ios-testflight-internal.ipa" \
            --api-key "${APP_STORE_CONNECT_API_KEY_ID}" \
            --api-issuer "${APP_STORE_CONNECT_API_ISSUER_ID}"

      - name: Delete temporary signing keychain
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${IOS_SIGNING_KEYCHAIN_PATH:-}" && -f "${IOS_SIGNING_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${IOS_SIGNING_KEYCHAIN_PATH}" || true
          fi

      - name: Upload iOS TestFlight logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-testflight-internal-logs
          path: artifacts/release-distribution/logs
          if-no-files-found: warn
